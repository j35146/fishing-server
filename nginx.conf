server {
    listen 80;
    client_max_body_size 500M;


    location /fishing-media/ {
        proxy_pass http://minio:9000;
        proxy_set_header Host $http_host;
    }

    location / {
        proxy_pass http://app:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
